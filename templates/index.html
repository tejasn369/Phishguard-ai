<!DOCTYPE html>
<html>
<head>
    <title>PhishGuard AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI, sans-serif;
        }

        body {
            background:#0e1117;
            color:white;
            display:flex;
            min-height:100vh;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sidebar {
            width:220px;
            background:#161b22;
            padding:20px;
        }

        .sidebar h2 {
            color:#ff6b00;
            margin-bottom:30px;
        }

        .sidebar a {
            display:block;
            margin-bottom:15px;
            color:#ccc;
            text-decoration:none;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .sidebar a:hover {
            color:#ff6b00;
        }

        .sidebar a:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        .main {
            flex:1;
            padding:20px;
        }

        .card {
            background:#161b22;
            padding:20px;
            border-radius:12px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
        }

        textarea {
            width:100%;
            height:120px;
            background:#1f2933;
            border:none;
            border-radius:8px;
            padding:10px;
            color:white;
            transition: all 0.3s ease;
        }

        textarea:focus {
            box-shadow: 0 0 12px rgba(255,107,0,0.6);
            transform: scale(1.01);
        }

        .meter {
            width:100%;
            height:12px;
            background:#2a2f36;
            border-radius:10px;
            margin:15px 0;
            overflow:hidden;
        }

        .fill {
            height:100%;
            width:0%;
            transition: width 0.6s cubic-bezier(.4,0,.2,1);
        }

        .safe { background:#16c784; }
        .warn { background:#f59e0b; }
        .danger { background:#ef4444; }

        @media(max-width:768px) {
            body { flex-direction:column; }
            .sidebar { width:100%; text-align:center; }
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>PhishGuard</h2>
    <a href="/">Scanner</a>
    <a href="/dashboard">Analytics</a>
</div>

<div class="main">
    <div class="card">
        <h2>Email Threat Scanner</h2>

        <textarea id="emailInput" placeholder="Paste email content..."></textarea>

        <div id="statusText"></div>

        <div class="meter">
            <div id="fill" class="fill"></div>
        </div>

        <div id="riskScore"></div>
        <div id="analysisContent"></div>
        <div id="urlWarnings"></div>
    </div>
</div>

<script>
const textarea = document.getElementById("emailInput");

textarea.addEventListener("input", function() {
    fetch("/analyze", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text:textarea.value})
    })
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("statusText").innerText = data.status;
        document.getElementById("riskScore").innerText = "Risk: " + data.risk + "%";
        document.getElementById("analysisContent").innerHTML = data.highlighted_text;

        let fill = document.getElementById("fill");
        fill.style.width = data.risk + "%";
        fill.className = "fill";

        if(data.risk > 70) fill.classList.add("danger");
        else if(data.risk > 40) fill.classList.add("warn");
        else fill.classList.add("safe");

        document.getElementById("urlWarnings").innerHTML =
            data.url_flags.join("<br>");
    });
});
</script>

</body>
</html>
