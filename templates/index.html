<!DOCTYPE html>
<html>
<head>
    <title>PhishGuard AI | Cybersecurity Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI, sans-serif;
        }

        body {
            background:#0e1117;
            color:white;
            display:flex;
            min-height:100vh;
        }

        .sidebar {
            width:220px;
            background:#161b22;
            padding:25px;
        }

        .sidebar h2 {
            color:#ff6b00;
            margin-bottom:30px;
        }

        .sidebar a {
            display:block;
            color:#ccc;
            text-decoration:none;
            margin-bottom:15px;
            transition:0.2s;
        }

        .sidebar a:hover {
            color:#ff6b00;
        }

        .main {
            flex:1;
            padding:40px;
        }

        .card {
            background:#161b22;
            padding:30px;
            border-radius:12px;
        }

        textarea {
            width:100%;
            height:150px;
            background:#1f2933;
            border:none;
            border-radius:8px;
            padding:15px;
            color:white;
            margin-top:15px;
        }

        textarea:focus {
            outline:2px solid #ff6b00;
        }

        .meter {
            width:100%;
            height:14px;
            background:#2a2f36;
            border-radius:10px;
            margin:20px 0;
            overflow:hidden;
        }

        .fill {
            height:100%;
            width:0%;
            transition:width 0.6s ease;
        }

        .safe { background:#16c784; }
        .warn { background:#f59e0b; }
        .danger { background:#ef4444; }

        .status {
            margin-top:15px;
            font-size:18px;
        }

        .analysis-box {
            margin-top:15px;
            background:#1c2128;
            padding:15px;
            border-radius:8px;
        }

        .url-warning {
            margin-top:10px;
            color:#ff6b6b;
            font-size:13px;
        }

        .footer {
            margin-top:40px;
            font-size:12px;
            color:#666;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>PhishGuard</h2>
    <a href="/">Threat Scanner</a>
    <a href="/dashboard">Analytics</a>
</div>

<div class="main">
    <div class="card">
        <h1>Real-Time Email Threat Scanner</h1>

        <textarea id="emailInput" placeholder="Paste or type email content here..."></textarea>

        <div class="status" id="statusText"></div>

        <div class="meter">
            <div id="fill" class="fill"></div>
        </div>

        <div id="riskScore"></div>

        <div class="analysis-box" id="analysisContent"></div>
        <div class="url-warning" id="urlWarnings"></div>
    </div>

    <div class="footer">
        © 2026 PhishGuard AI | Enterprise Cybersecurity Platform
    </div>
</div>

<script>
const textarea = document.getElementById("emailInput");

textarea.addEventListener("input", function() {

    fetch("/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ text: textarea.value })
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("statusText").innerText = data.status;
        document.getElementById("riskScore").innerText = "Risk Score: " + data.risk + "%";
        document.getElementById("analysisContent").innerHTML = data.highlighted_text;

        let fill = document.getElementById("fill");
        fill.style.width = data.risk + "%";
        fill.className = "fill";

        if (data.risk > 70) fill.classList.add("danger");
        else if (data.risk > 40) fill.classList.add("warn");
        else fill.classList.add("safe");

        document.getElementById("urlWarnings").innerHTML =
            data.url_flags.map(f => "⚠ " + f).join("<br>");
    });

});
</script>

</body>
</html>
