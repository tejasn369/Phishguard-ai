<!DOCTYPE html>
<html>
<head>
    <title>PhishGuard AI</title>
</head>
<body>
    <h1>Email Threat Scanner</h1>

    <textarea id="emailInput" rows="10" cols="60" placeholder="Paste email content..."></textarea>
    <br><br>
    <button onclick="analyzeEmail()">Analyze</button>

    <h3 id="statusText"></h3>
    <p id="riskScore"></p>
    <div id="analysisContent"></div>
    <div id="urlWarnings"></div>

<script>
function analyzeEmail() {
    const text = document.getElementById("emailInput").value;

    fetch("/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ text: text })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("statusText").innerText = data.status;
        document.getElementById("riskScore").innerText = "Risk Score: " + data.risk + "%";
        document.getElementById("analysisContent").innerHTML = data.highlighted_text;

        let urlDiv = document.getElementById("urlWarnings");
        urlDiv.innerHTML = "";
        data.url_flags.forEach(flag => {
            urlDiv.innerHTML += "⚠ " + flag + "<br>";
        });
    });
}
</script>

</body>
</html>
