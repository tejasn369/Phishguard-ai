<!DOCTYPE html>
<html>
<head>
    <title>PhishGuard AI | Cybersecurity Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            background: #0e1117;
            color: #fff;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: #161b22;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            color: #ff6b00;
            margin-bottom: 40px;
        }

        .sidebar a {
            color: #ccc;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 15px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            color: #ff6b00;
        }

        /* Main Content */
        .main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            margin-bottom: 30px;
        }

        h1 {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #1f2933;
            border: none;
            border-radius: 8px;
            padding: 15px;
            color: white;
            resize: none;
            font-size: 14px;
        }

        textarea:focus {
            outline: 2px solid #ff6b00;
        }

        .meter {
            width: 100%;
            height: 14px;
            background: #2a2f36;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            width: 0%;
            transition: width 0.8s ease-in-out;
        }

        .safe { background: #16c784; }
        .warn { background: #f59e0b; }
        .danger { background: #ef4444; }

        .status {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .analysis-box {
            margin-top: 15px;
            background: #1c2128;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }

        .url-warning {
            margin-top: 10px;
            color: #ff6b6b;
            font-size: 13px;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>PhishGuard</h2>
        <a href="/">Threat Scanner</a>
        <a href="/dashboard">Analytics</a>
        <a href="#">Reports</a>
        <a href="#">Settings</a>
    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="card">
            <h1>Real-Time Email Threat Scanner</h1>
            <textarea id="emailInput" placeholder="Paste or type email content here..."></textarea>

            <div class="status" id="statusText"></div>

            <div class="meter">
                <div id="fill" class="fill"></div>
            </div>

            <div id="riskScore"></div>

            <div class="analysis-box" id="analysisContent"></div>
            <div class="url-warning" id="urlWarnings"></div>
        </div>

        <div class="footer">
            © 2026 PhishGuard AI | Enterprise Cybersecurity Platform
        </div>

    </div>

<script>
const textarea = document.getElementById("emailInput");

textarea.addEventListener("input", function() {
    fetch("/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ text: textarea.value })
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("statusText").innerText = data.status;
        document.getElementById("riskScore").innerText = "Risk Score: " + data.risk + "%";
        document.getElementById("analysisContent").innerHTML = data.highlighted_text;

        let fill = document.getElementById("fill");
        fill.style.width = data.risk + "%";
        fill.className = "fill";

        if (data.risk > 70) fill.classList.add("danger");
        else if (data.risk > 40) fill.classList.add("warn");
        else fill.classList.add("safe");

        let urlDiv = document.getElementById("urlWarnings");
        urlDiv.innerHTML = "";
        data.url_flags.forEach(flag => {
            urlDiv.innerHTML += "⚠ " + flag + "<br>";
        });
    });
});
</script>

</body>

</html>
